<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생 슬롯머신 (롤링 버전)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background: radial-gradient(circle, #232526 0%, #414345 100%); color: white; text-align: center; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; height: 100vh; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h1 { color: #FFD700; margin-bottom: 40px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .slot-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 50px; perspective: 1000px; }
        .slot-box { 
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a); 
            border: 4px solid #FFD700; border-radius: 20px; width: 180px; height: 220px; 
            display: flex; justify-content: center; align-items: center; 
            color: #FFFFFF; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }
        .slot-reels { position: absolute; top: 0; width: 100%; transition: none; }
        /* [요청반영] 물음표와 글자 크기 다시 키움 */
        .reel-item { font-size: 100px; font-weight: bold; height: 220px; display: flex; justify-content: center; align-items: center; }
        .slot-fixed { background: linear-gradient(145deg, #444, #222); color: #FFD700; border-color: #FF4500; transform: scale(1.05); }
        button { font-size: 28px; padding: 20px 60px; cursor: pointer; background: linear-gradient(45deg, #FFD700, #FFA500); border: none; border-radius: 50px; font-weight: bold; color: #333; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s; }
        button:disabled { background: #777; cursor: not-allowed; }
        #status { margin-top: 30px; color: #aaa; }
        #winnerResult { font-size: 60px; font-weight: bold; margin-top: 30px; color: #FFD700; opacity: 0; transition: 0.3s; }
        #winnerResult.show { opacity: 1; }
    </style>
</head>
<body>
    <h1>🍀 행운의 주인공 추첨 🍀</h1>
    <div class="slot-container">
        <div id="s0" class="slot-box"><div class="slot-reels"><div class="reel-item">?</div></div></div>
        <div id="s1" class="slot-box"><div class="slot-reels"><div class="reel-item">?</div></div></div>
        <div id="s2" class="slot-box"><div class="slot-reels"><div class="reel-item">?</div></div></div>
    </div>
    <button id="startBtn" onclick="startSlot()" disabled>데이터 로딩 중...</button>
    <div id="status">연결 확인 중...</div>
    <div id="winnerResult"></div>

    <script>
        let students = [];
        function handleData(data) {
            students = data.filter(n => n && typeof n === 'string' && n.trim().length > 0);
            document.getElementById('status').innerText = "총 " + students.length + "명 로드 완료";
            if (students.length > 0) {
                document.getElementById('startBtn').disabled = false;
                document.getElementById('startBtn').innerText = "🎲 학생 뽑기 시작!";
            }
        }

        async function animateBox(boxId, index, winningChar, duration) {
            const box = document.getElementById(boxId);
            const reel = box.querySelector('.slot-reels');
            
            reel.style.transition = 'none';
            reel.style.transform = 'translateY(0px)';
            box.classList.remove('slot-fixed');
            reel.offsetHeight; 
            
            let shuffleList = [];
            for(let i=0; i<15; i++) { shuffleList = shuffleList.concat(students); }
            
            reel.innerHTML = shuffleList.map(name => `<div class="reel-item">${name[index] || '&nbsp;'}</div>`).join('');
            const itemHeight = 220;
            reel.style.height = `${shuffleList.length * itemHeight}px`;
            
            const winningIndices = [];
            shuffleList.forEach((name, i) => {
                if(i >= (students.length * 14) && name[index] === winningChar) winningIndices.push(i);
            });
            
            const stopIndex = winningIndices.length > 0 ? winningIndices[Math.floor(Math.random() * winningIndices.length)] : (students.length * 14);
            const targetY = -(stopIndex * itemHeight);
            
            // [요청반영] 마지막에 더 느릿하게 멈추도록 easing(가속도) 설정 변경
            reel.style.transition = `transform ${duration/1000}s cubic-bezier(0.15, 0.75, 0.5, 1.05)`;
            reel.style.transform = `translateY(${targetY}px)`;

            await new Promise(r => setTimeout(r, duration));
            box.classList.add('slot-fixed');
        }

        async function startSlot() {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('winnerResult').classList.remove('show');
            const winner = students[Math.floor(Math.random() * students.length)];
            
            let durations = [4000, 6000, 8000];
            for (let i = durations.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [durations[i], durations[j]] = [durations[j], durations[i]];
            }
            
            await Promise.all([
                animateBox('s0', 0, winner[0], durations[0]),
                animateBox('s1', 1, winner[1], durations[1]),
                animateBox('s2', 2, winner[2], durations[2])
            ]);
            
            document.getElementById('winnerResult').innerText = "🎉 당첨자: " + winner + " 🎉";
            document.getElementById('winnerResult').classList.add('show');
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            document.getElementById('startBtn').disabled = false;
        }
    </script>
    <script src="https://script.google.com/macros/s/AKfycbywliT7xugT-h-P2jlNZC-9u4yUMuXaTaK1Hlxd1Su2DOtZtMrz2U9XsFW9h129Er0Weg/exec?callback=handleData"></script>
</body>
</html>
